<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字探偵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --white: #FAFAFA;
  --ink: #1A1A1A;
  --vermillion: #C53D43;
  --emerald: #2D8B57;
  --error: #C53D43;
  --gray: #E0E0E0;
  --gray-light: #F5F5F5;
  --font: 'Noto Sans JP', 'Noto Sans SC', sans-serif;
}

html { font-size: 20px; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* Background character */
.bg-character {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  height: 75vh;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 0.3s ease;
  object-fit: contain;
}
body.result-screen .bg-character { opacity: 0.12; }

/* Correct popup */
.correct-popup {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 250;
  pointer-events: none;
  opacity: 0;
  background: rgba(255,255,255,0.3);
}
.correct-popup.active {
  animation: correct-popup-anim 1.5s ease forwards;
}
.correct-popup img {
  height: 50vh;
  max-height: 420px;
  object-fit: contain;
}
@keyframes correct-popup-anim {
  0% { opacity: 0; transform: scale(0.2); }
  12% { opacity: 1; transform: scale(1.25); }
  22% { opacity: 1; transform: scale(0.95); }
  30% { opacity: 1; transform: scale(1); }
  75% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

/* Creator watermark */
.watermark {
  position: fixed;
  bottom: 12px;
  /* right: 16px; */
  font-size: 0.9rem;
  color: rgba(0,0,0,0.12);
  letter-spacing: 0.03rem;
  font-weight: 500;
  pointer-events: none;
  z-index: 0;
  user-select: none;
  align-items: center;
  display: flex;
  justify-content: center;
  width: 100vw;
}

/* ===== Screens ===== */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 1;
}
.screen.active {
  opacity: 1; pointer-events: auto;
  z-index: 2;
}

/* ===== Home ===== */
#home { gap: 2rem; padding: 2rem; }
#home .title {
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--ink);
  position: relative;
}
#home .title::after {
  content: '';
  display: block;
  width: 60px; height: 2px;
  background: var(--vermillion);
  margin: 0.6rem auto 0;
}
#home .subtitle {
  font-size: clamp(0.9rem, 2.5vw, 1.1rem);
  color: #999;
  font-weight: 300;
  letter-spacing: 0.08em;
  margin-bottom: 1rem;
}
/* Settings icon button */
.settings-btn {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 36px; height: 36px;
  border: 1px solid var(--gray);
  border-radius: 50%;
  background: var(--white);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, transform 0.2s;
  z-index: 10;
}
.settings-btn:hover {
  border-color: var(--ink);
  transform: rotate(30deg);
}
.settings-btn svg {
  width: 18px; height: 18px;
  fill: #888;
  transition: fill 0.2s;
}
.settings-btn:hover svg { fill: var(--ink); }

/* Settings popover */
.settings-popover {
  position: absolute;
  top: 3.5rem;
  right: 1.5rem;
  background: var(--white);
  border: 1px solid var(--gray);
  border-radius: 6px;
  padding: 1rem 1.2rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 20;
}
.settings-popover.open {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
.settings-popover .popover-title {
  font-size: 0.75rem;
  font-weight: 500;
  color: #999;
  letter-spacing: 0.05em;
  margin-bottom: 0.8rem;
}
.settings-list {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}
.settings-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.settings-item-label {
  font-size: 0.85rem;
  color: #555;
}
.settings-item-control {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.3rem 0.5rem;
  border: 1px solid var(--gray);
  border-radius: 4px;
  background: var(--white);
}
.settings-item-control input[type="number"] {
  width: 48px;
  border: none;
  outline: none;
  font-family: var(--font);
  font-size: 0.9rem;
  color: var(--ink);
  background: transparent;
  text-align: right;
}
.settings-item-control .unit {
  font-size: 0.8rem;
  color: #999;
}
.settings-item-control.toggle {
  padding: 0;
  border: none;
  background: transparent;
}
.settings-item-control input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

/* Mode Cards */
.mode-cards {
  display: flex; gap: 1.5rem;
  flex-wrap: wrap; justify-content: center;
  padding: 0 1rem;
}
.mode-card {
  width: clamp(200px, 40vw, 280px);
  padding: 2.5rem 2rem;
  border: 1px solid var(--gray);
  border-radius: 4px;
  background: var(--white);
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  position: relative;
  overflow: hidden;
}
.mode-card:hover {
  border-color: var(--ink);
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}
.mode-card .icon {
  font-size: 2.8rem;
  line-height: 1;
}
.mode-card .card-title {
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: 0.05em;
}
.mode-card .card-desc {
  font-size: 0.78rem;
  color: #999;
  line-height: 1.6;
  text-align: center;
}
.mode-card .card-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--vermillion);
  transform: scaleX(0);
  transition: transform 0.3s ease;
}
.mode-card:hover .card-hint { transform: scaleX(1); }

/* ===== Game Header ===== */
.game-header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.5rem;
  background: rgba(250,250,250,0.95);
  border-bottom: 1px solid var(--gray);
  z-index: 10;
}
.game-header .back-btn {
  font-size: 0.85rem;
  color: #999;
  cursor: pointer;
  background: none; border: none;
  font-family: var(--font);
  transition: color 0.2s;
}
.game-header .back-btn:hover { color: var(--ink); }

/* Stats Bar */
.stats-bar {
  display: flex; gap: 1.5rem;
  font-size: 0.82rem;
  color: #888;
}
.stats-bar .stat {
  display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
}
.stats-bar .stat-value {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--ink);
  transition: transform 0.3s;
}
.stats-bar .stat-label {
  font-size: 0.7rem;
  letter-spacing: 0.05em;
}

/* Timer */
.timer-bar {
  position: absolute; top: 62px; left: 0; right: 0;
  height: 3px;
  background: var(--gray);
  z-index: 9;
}
.timer-bar .timer-fill {
  height: 100%;
  background: var(--vermillion);
  transition: width 0.1s linear;
  width: 100%;
}

/* Level Badge */
.level-badge {
  font-size: 0.72rem;
  font-weight: 500;
  padding: 0.2rem 0.65rem;
  border: 1px solid var(--gray);
  border-radius: 3px;
  color: #888;
  letter-spacing: 0.05em;
  transition: all 0.3s;
}
.level-badge.level-2 {
  border-color: var(--vermillion);
  color: var(--vermillion);
}

/* ===== Grid Mode ===== */
#grid-mode { padding-top: 80px; }

.grid-container {
  display: grid;
  gap: 6px;
  padding: 1rem;
  justify-content: center;
}
.grid-cell {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--gray);
  border-radius: 4px;
  font-size: clamp(1.2rem, 4vw, 2rem);
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
  background: var(--white);
}
.grid-cell::before {
  content: attr(data-label);
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 0.65rem;
  color: #aaa;
  pointer-events: none;
  font-weight: 400;
  letter-spacing: 0;
}
@media (max-width: 480px) {
  .grid-cell::before {
    display: none;
  }
}
.grid-cell:hover {
  border-color: var(--gray);
}
.grid-cell.correct {
  border-color: var(--emerald);
  background: #E8F5E9;
}
.grid-cell.wrong {
  border-color: var(--error);
  background: #FFEBEE;
}

/* Grid cell animation on appear */
@keyframes spring-in {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  80% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}
.grid-cell.animate-in {
  animation: spring-in 0.4s ease forwards;
  opacity: 0;
}

/* Correct ripple */
@keyframes correct-ripple {
  0% { box-shadow: 0 0 0 0 rgba(45,139,87,0.4); transform: scale(1); }
  50% { box-shadow: 0 0 0 12px rgba(45,139,87,0); transform: scale(1.12); }
  100% { box-shadow: 0 0 0 0 rgba(45,139,87,0); transform: scale(1); }
}
.grid-cell.correct {
  animation: correct-ripple 0.5s ease;
}

/* Wrong shake */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.grid-cell.wrong {
  animation: shake 0.4s ease;
}

/* ===== Sentence Mode ===== */
#sentence-mode { padding-top: 80px; gap: 1rem; }

.sentence-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
  padding: 0 1.5rem;
  width: 100%;
  max-width: calc(100vw - 3rem);
}
.sentence-item {
  display: inline-block;
  font-size: clamp(1rem, 3.5vw, 1.4rem);
  line-height: 2.2;
  letter-spacing: 0.05em;
  padding: 0.5rem 1rem;
  border: 1px solid var(--gray);
  border-radius: 4px;
  background: var(--white);
  text-align: left;
  white-space: nowrap;
  overflow: visible;
}
.sentence-segment {
  display: inline;
  white-space: nowrap;
}
.sentence-char {
  display: inline-block;
  cursor: default;
  padding: 0.15em 0.1em;
  border-bottom: 2px solid transparent;
  transition: border-color 0.2s, color 0.2s, background-color 0.2s, transform 0.1s;
  border-radius: 4px;
}
.sentence-char.clickable {
  cursor: pointer;
  padding: 0.2em 0.2em;
  margin: 0 0.1em;
  margin-bottom: 0.2em;
  background-color: #f5f5f5;
  border: 1px solid #e0e0e0;
  box-shadow: 0 2px 0 #e0e0e0;
}
.sentence-char.clickable:active {
  transform: translateY(2px);
  box-shadow: none;
}
@media (hover: hover) and (pointer: fine) {
  .sentence-char.clickable:hover {
    border-color: var(--vermillion);
    color: var(--vermillion);
    background-color: #fff5f5;
    box-shadow: 0 2px 0 var(--vermillion);
  }
}
.sentence-char.correct {
  color: var(--emerald);
  border-bottom-color: var(--emerald);
  font-weight: 700;
}
.sentence-char.wrong-char {
  color: var(--error);
  border-bottom-color: var(--error);
  animation: shake 0.3s ease;
}

/* Wavy underline for answer */
@keyframes wavy-underline {
  0% { text-decoration-color: var(--vermillion); }
  50% { text-decoration-color: transparent; }
  100% { text-decoration-color: var(--vermillion); }
}
.sentence-char.reveal {
  color: var(--emerald);
  font-weight: 700;
  text-decoration: underline wavy var(--emerald);
  animation: wavy-underline 0.8s ease 2;
}

/* ===== Result Screen ===== */
#result { gap: 1.5rem; padding: 2rem; }
#result .result-title {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 0.1em;
}
#result .result-title::after {
  content: '';
  display: block;
  width: 40px; height: 2px;
  background: var(--vermillion);
  margin: 0.5rem auto 0;
}
.result-stats {
  display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;
}
.result-stat {
  display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
}
.result-stat .rs-value {
  font-size: 2rem;
  font-weight: 700;
}
.result-stat .rs-label {
  font-size: 0.78rem;
  color: #999;
}
.result-stat .rs-value.emerald { color: var(--emerald); }
.result-stat .rs-value.vermillion { color: var(--vermillion); }

/* Score flying */
@keyframes score-pop {
  0% { transform: scale(0.5) translateY(0); opacity: 1; }
  100% { transform: scale(1) translateY(-40px); opacity: 0; }
}
.flying-score {
  position: fixed;
  font-size: 1.3rem;
  font-weight: 700;
  pointer-events: none;
  z-index: 100;
  animation: score-pop 0.8s ease forwards;
  font-family: var(--font);
}
.flying-score.plus { color: var(--emerald); }
.flying-score.minus { color: var(--error); }

/* Combo */
@keyframes combo-pop {
  0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
  50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
  100% { transform: translateX(-50%) scale(1); opacity: 1; }
}
.combo-display {
  position: fixed;
  top: 80px; left: 50%;
  transform: translateX(-50%);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--vermillion);
  opacity: 0;
  pointer-events: none;
  z-index: 50;
}
.combo-display.show {
  animation: combo-pop 0.3s ease forwards;
}

/* Screen shake */
@keyframes screen-shake {
  0%, 100% { transform: translate(0); }
  10% { transform: translate(-2px, 1px); }
  30% { transform: translate(2px, -1px); }
  50% { transform: translate(-1px, 2px); }
  70% { transform: translate(1px, -2px); }
  90% { transform: translate(-2px, 0); }
}
.screen.shake {
  animation: screen-shake 0.3s ease;
}

/* Level up flash */
@keyframes level-up-flash {
  0% { opacity: 0; }
  30% { opacity: 0.7; }
  100% { opacity: 0; }
}
.level-flash {
  position: fixed; inset: 0;
  background: white;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
}
.level-flash.active {
  animation: level-up-flash 0.6s ease forwards;
}

/* Level up text */
.level-up-text {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 2rem;
  font-weight: 700;
  color: var(--vermillion);
  pointer-events: none;
  z-index: 201;
  opacity: 0;
  white-space: nowrap;
}
.level-up-text.active {
  animation: level-up-text-anim 1.2s ease forwards;
}
@keyframes level-up-text-anim {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}

/* Buttons */
.btn {
  padding: 0.7rem 2rem;
  border: 1px solid var(--gray);
  border-radius: 4px;
  background: var(--white);
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  letter-spacing: 0.05em;
}
.btn:hover {
  border-color: var(--ink);
  background: var(--gray-light);
}
.btn-primary {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}
.btn-primary:hover {
  background: #333;
}

/* Particle system */
.particle {
  position: fixed;
  width: 6px; height: 6px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 150;
}

/* Round indicator */
.round-indicator {
  position: fixed;
  bottom: 3rem; left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  color: #bbb;
  letter-spacing: 0.05em;
  z-index: 10;
}

/* Timeout flash */
@keyframes timeout-flash {
  0%, 100% { background: var(--white); }
  25% { background: #FFF0F0; }
  75% { background: #FFF0F0; }
}
.screen.timeout {
  animation: timeout-flash 0.5s ease 2;
}

/* Error teaching modal */
.error-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 300;
  pointer-events: none;
  opacity: 0;
}
.error-modal.open {
  animation: modal-sequence 1s ease forwards;
}
@keyframes modal-sequence {
  0% { opacity: 0; }
  100% { opacity: 1; pointer-events: auto; }
}

/* Batsu character - pop then move to modal corner */
.error-batsu-popup {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.15);
  z-index: 400;
  pointer-events: none;
  opacity: 0;
}
.error-batsu-popup.open {
  animation: batsu-sequence 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.error-batsu-popup img {
  height: 38vh;
  max-height: 300px;
  object-fit: contain;
}
@keyframes batsu-sequence {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.15); top: 50%; left: 50%; }
  25% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); top: 50%; left: 50%; }
  40% { transform: translate(-50%, -50%) scale(1); top: 50%; left: 50%; }
  55% { opacity: 1; transform: translate(-50%, -50%) scale(0.7); top: 28%; left: 42%; }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(0.7); top: 28%; left: 42%; }
}

/* Modal inner */
.error-modal-inner {
  background: var(--white);
  border-radius: 8px;
  padding: 1.8rem 2rem;
  position: relative;
  overflow: visible;
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  min-width: 260px;
  max-width: 90vw;
  opacity: 0;
}
.error-modal.open .error-modal-inner {
  animation: modal-fade-in 0.4s ease 0.55s forwards;
}
@keyframes modal-fade-in {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
.error-modal-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--error);
  letter-spacing: 0.08em;
  position: relative;
  z-index: 1;
}
.error-comparison {
  display: flex; align-items: center; gap: 1.2rem;
  position: relative;
  z-index: 1;
}
.error-char-block {
  display: flex; flex-direction: column; align-items: center; gap: 0.3rem;
  padding: 0.8rem 1.2rem;
  border-radius: 6px;
  border: 2px solid transparent;
}
.error-char-block.wrong-block {
  background: #FFEBEE;
  border-color: var(--error);
}
.error-char-block.correct-block {
  background: #E8F5E9;
  border-color: var(--emerald);
}
.error-char {
  font-size: 2.6rem;
  font-weight: 700;
  line-height: 1;
}
.wrong-block .error-char { color: var(--error); }
.correct-block .error-char { color: var(--emerald); }
.error-char-label {
  font-size: 0.7rem;
  color: #999;
  letter-spacing: 0.05em;
}
.error-arrow {
  font-size: 1.3rem;
  color: #bbb;
  font-weight: 300;
}
.error-note {
  font-size: 0.8rem;
  color: #777;
  text-align: center;
  line-height: 1.5;
  max-width: 260px;
  position: relative;
  z-index: 1;
}
.error-next-btn {
  margin-top: 0.3rem;
  min-width: 160px;
  position: relative;
  z-index: 1;
}

/* Responsive */
@media (max-width: 480px) {
  #home { gap: 1.2rem; }
  #home,
  #result {
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding:
      max(1rem, env(safe-area-inset-top))
      1rem
      max(1.5rem, env(safe-area-inset-bottom));
  }
  #home .mode-cards {
    width: 100%;

//  DATA

const LEVEL_ONE_RATIO = 0.35;
const CHAR_PAIRS = Object.entries(data)
  .filter(([chinese, japanese]) => chinese && japanese)
  .map(([chinese, japanese]) => ({ chinese, japanese }));

const levelOneCount = Math.max(1, Math.floor(CHAR_PAIRS.length * LEVEL_ONE_RATIO));

const GRID_QUESTIONS = CHAR_PAIRS.map((pair, index) => ({
  ...pair,
  level: index < levelOneCount ? 1 : 2,
}));

const SENTENCE_PAIRS = Object.entries(sentences)
  .map(([wrongChar, wrongSentence]) => {
    const correctChar = data[wrongChar];
    const chars = [...wrongSentence];
    const answerIndex = chars.indexOf(wrongChar);

    if (!correctChar || answerIndex === -1) return null;

    const sentence = [...chars];
    sentence[answerIndex] = correctChar;

    return {
      wrongChar,
      correctChar,
      wrongSentence,
      sentence: sentence.join(''),
    };
  })
  .filter(Boolean);

const sentenceLevelOneCount = Math.max(1, Math.floor(SENTENCE_PAIRS.length * LEVEL_ONE_RATIO));

const SENTENCE_QUESTIONS = SENTENCE_PAIRS.map((pair, index) => ({
  level: index < sentenceLevelOneCount ? 1 : 2,
  sentence: pair.sentence,
  wrong: pair.wrongSentence,
  answer: pair.wrongChar,
  correct: pair.correctChar,
  answerIndex: [...pair.wrongSentence].indexOf(pair.wrongChar),
}));

const TOTAL_ROUNDS = 10;
const DEFAULT_ROUND_TIME = 15;
const MIN_ROUND_TIME = 5;
const MAX_ROUND_TIME = 120;
const NON_CLICKABLE_SENTENCE_CHAR_RE = /[\s、，,。．！？!?：:；;「」『』（）()［］\[\]【】〈〉《》〔〕｛｝{}・…~～\-ー—―]/;

// ============================================================
//  AUDIO
// ============================================================

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) audioCtx = new AudioContext();
  return audioCtx;
}

function playSound(type) {
  if (!gameConfig.soundEnabled) return;
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);

  if (type === 'correct') {
    osc.frequency.setValueAtTime(523, ctx.currentTime);
    osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } else if (type === 'wrong') {
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.setValueAtTime(250, ctx.currentTime + 0.15);
    osc.frequency.setValueAtTime(200, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } else if (type === 'popup') {
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.setValueAtTime(800, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } else if (type === 'click') {
    osc.frequency.setValueAtTime(440, ctx.currentTime);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.05);
  } else if (type === 'countdown') {
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  } else if (type === 'timeout') {
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  }
}

// ============================================================
//  HELPERS
// ============================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getAccuracy() {
  return state.total === 0 ? 0 : Math.round((state.correct / state.total) * 100);
}

function getRoundTimeFromInput() {
  const input = document.getElementById('round-time-input');
  const raw = input ? parseInt(input.value, 10) : DEFAULT_ROUND_TIME;
  const safe = Number.isFinite(raw)
    ? Math.min(MAX_ROUND_TIME, Math.max(MIN_ROUND_TIME, raw))
    : DEFAULT_ROUND_TIME;
  if (input) input.value = String(safe);
  return safe;
}

function getSoundEnabled() {
  const input = document.getElementById('sound-toggle');
  return input ? input.checked : true;
}

// ============================================================
//  SCREEN MANAGEMENT
// ============================================================

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.body.classList.toggle('result-screen', id === 'result');
}

function goHome() {
  stopTimer();
  showScreen('home');
}

// ============================================================
//  GAME START
// ============================================================

function startGame(mode) {
  gameConfig.roundTime = getRoundTimeFromInput();
  gameConfig.soundEnabled = getSoundEnabled();
  state = {
    mode,
    score: 0,
    combo: 0,
    maxCombo: 0,
    correct: 0,
    total: 0,
    level: 1,
    round: 0,
    answered: false,
    timerInterval: null,
    timeLeft: 0,
  };
  showScreen(mode === 'grid' ? 'grid-mode' : 'sentence-mode');
  updateStats();
  nextRound();
}

function restartGame() {
  startGame(state.mode);
}

// ============================================================
//  STATS UPDATE
// ============================================================

function updateStats() {
  const prefix = state.mode === 'grid' ? 'grid' : 'sentence';
  const scoreEl = document.getElementById(`${prefix}-score`);
  const comboEl = document.getElementById(`${prefix}-combo`);
  const accEl   = document.getElementById(`${prefix}-accuracy`);
  const lvlEl   = document.getElementById(`${prefix}-level`);
  const roundEl = document.getElementById(`${prefix}-round`);

  scoreEl.textContent = state.score;
  comboEl.textContent = state.combo;
  accEl.textContent   = getAccuracy() + '%';
  lvlEl.textContent   = 'Lv' + state.level;
  lvlEl.className     = 'level-badge' + (state.level === 2 ? ' level-2' : '');
  roundEl.textContent = `第 ${state.round + 1} / ${TOTAL_ROUNDS} 問`;
}

// ============================================================
//  TIMER
// ============================================================

function startTimer(seconds, onTimeout) {
  stopTimer();
  state.timeLeft = seconds;
  const prefix = state.mode === 'grid' ? 'grid' : 'sentence';
  const fill = document.getElementById(`${prefix}-timer`);
  fill.style.width = '100%';

  const startTime = Date.now();
  const duration = seconds * 1000;

  state.timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.max(0, 1 - elapsed / duration);
    fill.style.width = (pct * 100) + '%';

    if (pct <= 0) {
      stopTimer();
      onTimeout();
    }
  }, 50);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

// ============================================================
//  NEXT ROUND
// ============================================================

function nextRound() {
  if (state.round >= TOTAL_ROUNDS) {
    showResult();
    return;
  }
  state.answered = false;
  adjustLevel();

  if (state.mode === 'grid') {
    showGridRound();
  } else {
    showSentenceRound();
  }
}

function adjustLevel() {
  if (state.total < 3) return; // wait a few rounds
  const acc = getAccuracy();
  if (acc > 80 && state.level < 2) {
    state.level = 2;
    levelUpEffect();
  } else if (acc < 50 && state.level > 1) {
    state.level = 1;
  }
  updateStats();
}

// ============================================================
//  GRID MODE
// ============================================================

function showGridRound() {
  const container = document.getElementById('grid-container');
  container.innerHTML = '';

  const gridSize = state.level === 1 ? 6 : 7;

  // 计算可用宽度，动态调整格子大小
  const padding = 16; // 两侧 padding
  const gap = 6;     // grid gap
  const availableWidth = window.innerWidth - padding * 2;
  const maxCellSize = Math.floor((availableWidth - gap * (gridSize - 1)) / gridSize);
  const cellSize = Math.max(36, Math.min(maxCellSize, 88)); // 最小 36px，最大 88px

  container.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;

  // Pick a question for current level
  const pool = GRID_QUESTIONS.filter(q => q.level <= state.level);
  const question = pickRandom(pool);
  state.currentQuestion = question;

  // Pick a random position for the Japanese char
  const total = gridSize * gridSize;
  const correctPos = Math.floor(Math.random() * total);

  for (let i = 0; i < total; i++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell animate-in';
    cell.style.animationDelay = (i * 0.02) + 's';
    const row = String.fromCharCode(65 + Math.floor(i / gridSize));
    const col = (i % gridSize) + 1;
    cell.dataset.label = row + col;

    const isCorrect = i === correctPos;
    cell.textContent = isCorrect ? question.japanese : question.chinese;

    cell.addEventListener('click', () => {
      if (state.answered) return;
      state.answered = true;
      stopTimer();

      if (isCorrect) {
        handleCorrect(cell, cell);
      } else {
        // Highlight the correct cell
        handleWrong(cell, container.children[correctPos]);
      }
    });

    container.appendChild(cell);
  }

  startTimer(gameConfig.roundTime, () => {
    if (state.answered) return;
    state.answered = true;
    handleTimeout(container.children[correctPos]);
  });
}

// ============================================================
//  SENTENCE MODE
// ============================================================

function showSentenceRound() {
  const block = document.getElementById('sentence-block');
  block.innerHTML = '';

  const pool = SENTENCE_QUESTIONS.filter(q => q.level <= state.level);
  const q = pickRandom(pool);
  state.currentQuestion = q;

  const container = document.createElement('div');
  container.className = 'sentence-item';

  // Render the wrong sentence with clickable characters
  const chars = [...q.wrong];
  let answeredLocal = false;
  const breakChars = new Set(['、', '，', ',', '。', '！', '？', '!', '?']);
  let segment = document.createElement('span');
  segment.className = 'sentence-segment';
  
  let lineCharCount = 0;
  const MAX_CHARS_PER_LINE = window.innerWidth <= 480 ? 12 : 999;

  chars.forEach((ch, idx) => {
    const span = document.createElement('span');
    span.className = 'sentence-char';
    span.textContent = ch;
    const isClickable = !NON_CLICKABLE_SENTENCE_CHAR_RE.test(ch);
    if (isClickable) span.classList.add('clickable');

    if (!isClickable) {
      segment.appendChild(span);
      lineCharCount++;
      if (breakChars.has(ch)) {
        container.appendChild(segment);
        if (idx < chars.length - 1) {
          container.appendChild(document.createElement('br'));
        }
        segment = document.createElement('span');
        segment.className = 'sentence-segment';
        lineCharCount = 0;
      } else if (lineCharCount >= MAX_CHARS_PER_LINE && idx < chars.length - 1) {
        // Peek next char to avoid breaking before punctuation
        const nextCh = chars[idx + 1];
        if (!breakChars.has(nextCh)) {
          container.appendChild(segment);
          container.appendChild(document.createElement('br'));
          segment = document.createElement('span');
          segment.className = 'sentence-segment';
          lineCharCount = 0;
        }
      }
      return;
    }

    if (idx === q.answerIndex) {
      span.addEventListener('click', () => {
        if (answeredLocal) return;
        answeredLocal = true;
        state.answered = true;
        stopTimer();
        // Reveal correct char
        span.textContent = q.correct;
        span.classList.add('reveal');
        handleCorrect(span, span);
      });
    } else {
      span.addEventListener('click', () => {
        if (answeredLocal) return;
        answeredLocal = true;
        state.answered = true;
        stopTimer();
        span.classList.add('wrong-char');
        // Also reveal correct answer
        const correctSpan = container.querySelectorAll('.sentence-char')[q.answerIndex];
        correctSpan.textContent = q.correct;
        correctSpan.classList.add('reveal');
        handleWrong(span, correctSpan);
      });
    }

    segment.appendChild(span);
    lineCharCount++;

    if (breakChars.has(ch)) {
      container.appendChild(segment);
      if (idx < chars.length - 1) {
        container.appendChild(document.createElement('br'));
      }
      segment = document.createElement('span');
      segment.className = 'sentence-segment';
      lineCharCount = 0;
    } else if (lineCharCount >= MAX_CHARS_PER_LINE && idx < chars.length - 1) {
      const nextCh = chars[idx + 1];
      if (!breakChars.has(nextCh)) {
        container.appendChild(segment);
        container.appendChild(document.createElement('br'));
        segment = document.createElement('span');
        segment.className = 'sentence-segment';
        lineCharCount = 0;
      }
    }
  });

  if (segment.childNodes.length) {
    container.appendChild(segment);
  }

  block.appendChild(container);

  // Also show the correct sentence for reference (subtle)
  const ref = document.createElement('div');
  ref.style.cssText = 'font-size:0.78rem; color:#bbb; margin-top:0.5rem; letter-spacing:0.05em;';
  ref.className = 'sentence-ref';
  ref.textContent = '正解：' + q.sentence;
  ref.style.opacity = '0';
  ref.style.transition = 'opacity 0.5s';
  block.appendChild(ref);
  fitSentenceLayout();

  startTimer(gameConfig.roundTime, () => {
    if (answeredLocal) return;
    answeredLocal = true;
    state.answered = true;
    const correctSpan = container.querySelectorAll('.sentence-char')[q.answerIndex];
    correctSpan.textContent = q.correct;
    correctSpan.classList.add('reveal');
    ref.style.opacity = '1';
    handleTimeout(correctSpan);
  });
}

function fitSentenceLayout() {
  const block = document.getElementById('sentence-block');
  const container = block ? block.querySelector('.sentence-item') : null;
  const ref = block ? block.querySelector('.sentence-ref') : null;
  if (!block || !container) return;

  const availableWidth = Math.max(120, window.innerWidth - 64);
  const targets = ref ? [container, ref] : [container];

  targets.forEach((node) => {
    node.style.fontSize = '';
    const baseFontSize = parseFloat(getComputedStyle(node).fontSize);
    const contentWidth = node.scrollWidth;

    if (contentWidth > availableWidth && baseFontSize > 0) {
      node.style.fontSize = `${baseFontSize * (availableWidth / contentWidth)}px`;
    }
  });

  const widest = Math.max(...targets.map(node => node.getBoundingClientRect().width));
  block.style.width = `${Math.min(availableWidth, Math.ceil(widest))}px`;
}

// ============================================================
//  ANSWER HANDLING
// ============================================================

function handleCorrect(element, source) {
  state.correct++;
  state.total++;
  state.combo++;
  if (state.combo > state.maxCombo) state.maxCombo = state.combo;

  const comboMultiplier = 1 + 0.5 * Math.min(state.combo - 1, 5);
  const points = Math.round(100 * comboMultiplier);
  state.score += points;

  element.classList.add('correct');
  playSound('correct');
  spawnParticles(source, 'emerald');
  showCorrectPopup();
  showFlyingScore(source, '+' + points, 'plus');
  showCombo();

  if (state.combo >= 3) {
    document.querySelector('.screen.active').classList.add('shake');
    setTimeout(() => document.querySelector('.screen.active').classList.remove('shake'), 300);
  }

  updateStats();
  state.round++;
  setTimeout(nextRound, 700);
}

function handleWrong(element, correctElement) {
  state.total++;
  state.combo = 0;
  state.score = Math.max(0, state.score - 30);

  element.classList.add('wrong');
  playSound('wrong');
  if (correctElement) {
    correctElement.classList.add('correct');
  }
  showFlyingScore(element, '-30', 'minus');
  updateStats();
  state.round++;
  showErrorModal();
}

function handleTimeout(correctElement) {
  state.total++;
  state.combo = 0;
  playSound('timeout');

  if (correctElement) {
    correctElement.classList.add('correct');
  }

  const screen = document.querySelector('.screen.active');
  screen.classList.add('timeout');
  setTimeout(() => screen.classList.remove('timeout'), 1000);

  updateStats();
  state.round++;
  showErrorModal();
}

function showErrorModal() {
  const modal = document.getElementById('error-modal');
  const batsu = document.getElementById('error-batsu-popup');
  const q = state.currentQuestion;
  const wrongChar = q ? (q.answer || q.chinese) : '?';
  const correctChar = q ? (q.correct || q.japanese) : '?';

  playSound('wrong');

  document.getElementById('error-wrong-char').textContent = wrongChar;
  document.getElementById('error-correct-char').textContent = correctChar;

  modal.classList.add('open');
  batsu.classList.add('open');
}

function dismissErrorModal() {
  const modal = document.getElementById('error-modal');
  const batsu = document.getElementById('error-batsu-popup');
  modal.classList.remove('open');
  batsu.classList.remove('open');
  nextRound();
}

// ============================================================
//  VISUAL EFFECTS
// ============================================================

function showFlyingScore(source, text, type) {
  const el = document.createElement('div');
  el.className = 'flying-score ' + type;
  el.textContent = text;

  const rect = source.getBoundingClientRect
    ? source.getBoundingClientRect()
    : { left: window.innerWidth / 2, top: window.innerHeight / 2 };
  el.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  el.style.top  = (rect.top + rect.height / 2) + 'px';

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function showCombo() {
  if (state.combo < 2) return;
  const el = document.getElementById('combo-display');
  el.textContent = state.combo + ' 連撃！';
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

function showCorrectPopup() {
  playSound('popup');
  const el = document.getElementById('correct-popup');
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 1600);
}

function spawnParticles(source, color) {
  const rect = source.getBoundingClientRect
    ? source.getBoundingClientRect()
    : { left: window.innerWidth / 2, top: window.innerHeight / 2, width: 0, height: 0 };
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const count = 12;
  const colors = {
    emerald: ['#2D8B57', '#4CAF50', '#81C784'],
    error:   ['#C53D43', '#EF5350', '#E57373'],
  };

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const c = colors[color] || colors.emerald;
    p.style.background = c[Math.floor(Math.random() * c.length)];
    p.style.left = cx + 'px';
    p.style.top  = cy + 'px';
    p.style.width = p.style.height = (3 + Math.random() * 5) + 'px';

    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist  = 30 + Math.random() * 50;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;

    document.body.appendChild(p);

    p.animate([
      { transform: 'translate(0, 0) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
    ], { duration: 500 + Math.random() * 300, easing: 'ease-out', fill: 'forwards' });

    setTimeout(() => p.remove(), 900);
  }
}

function levelUpEffect() {
  const flash = document.getElementById('level-flash');
  const text  = document.getElementById('level-up-text');
  flash.classList.add('active');
  text.classList.add('active');
  setTimeout(() => {
    flash.classList.remove('active');
    text.classList.remove('active');
  }, 1300);
}

// ============================================================
//  RESULT
// ============================================================

// Settings popover toggle
(function() {
  const btn = document.getElementById('settings-btn');
  const pop = document.getElementById('settings-popover');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    pop.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!pop.contains(e.target) && e.target !== btn) {
      pop.classList.remove('open');
    }
  });
})();

function showResult() {
  stopTimer();
  document.getElementById('result-score').textContent   = state.score;
  document.getElementById('result-accuracy').textContent = getAccuracy() + '%';
  document.getElementById('result-combo').textContent    = state.maxCombo;
  document.getElementById('result-level').textContent    = 'Lv' + state.level;

  showScreen('result');
}

// Apply initial screen state so background image is hidden on home.
showScreen('home');
window.addEventListener('resize', fitSentenceLayout);

window.startGame = startGame;
window.restartGame = restartGame;
window.goHome = goHome;
window.dismissErrorModal = dismissErrorModal;
</script>
